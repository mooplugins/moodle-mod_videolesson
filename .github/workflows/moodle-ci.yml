name: Moodle Plugin CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  test:
    name: ${{ matrix.moodle-branch }} (PHP ${{ matrix.php }}, ${{ matrix.database }})
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: 'postgres'
          POSTGRES_HOST_AUTH_METHOD: 'trust'
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      mariadb:
        image: mariadb:10.11
        env:
          MARIADB_ALLOW_EMPTY_ROOT_PASSWORD: 'yes'
          MARIADB_ROOT_HOST: '%'
          MYSQL_CHARACTER_SET_SERVER: 'utf8mb4'
          MYSQL_COLLATION_SERVER: 'utf8mb4_unicode_ci'
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      fail-fast: false
      matrix:
        include:
          # Moodle 4.5 — PHP 8.1, PostgreSQL, Node 20 (matches typical 4.x Grunt).
          - php: '8.1'
            moodle-branch: 'MOODLE_405_STABLE'
            database: 'pgsql'
            node: '20'
          # Moodle 5.0 — PHP 8.2, PostgreSQL, Node 22 (core Grunt expects current LTS range).
          - php: '8.2'
            moodle-branch: 'MOODLE_500_STABLE'
            database: 'pgsql'
            node: '22'
          # Moodle 5.2 — PHP 8.3, MariaDB (root, empty password), Node 22.11+ (core package.json engines).
          - php: '8.3'
            moodle-branch: 'MOODLE_502_STABLE'
            database: 'mariadb'
            node: '22.11'

    steps:
      - name: Check out mod_videolesson
        uses: actions/checkout@v4
        with:
          path: plugin

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, pgsql, mysqli, zip, gd, soap, intl, sodium, exif
          ini-values: max_input_vars=5000
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Initialise moodle-plugin-ci
        env:
          COMPOSER_AUTH: '{}'
        run: |
          if [ -n "${COMPOSER_HOME:-}" ]; then
            rm -f "$COMPOSER_HOME/auth.json"
          fi
          rm -f "$HOME/.composer/auth.json" "$HOME/.config/composer/auth.json"
          composer create-project -n --no-dev --prefer-dist moodlehq/moodle-plugin-ci ci ^4.5
          echo $(cd ci/bin; pwd) >> $GITHUB_PATH
          echo $(cd ci/vendor/bin; pwd) >> $GITHUB_PATH
          sudo locale-gen en_AU.UTF-8
          echo "NVM_DIR=$HOME/.nvm" >> $GITHUB_ENV

      - name: Install Moodle and mod_videolesson
        run: moodle-plugin-ci install --plugin $GITHUB_WORKSPACE/plugin --db-host=127.0.0.1
        env:
          DB: ${{ matrix.database }}
          MOODLE_BRANCH: ${{ matrix.moodle-branch }}

      - name: PHP Lint
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci phplint $GITHUB_WORKSPACE/plugin

      - name: PHP Mess Detector
        continue-on-error: true
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci phpmd $GITHUB_WORKSPACE/plugin

      - name: Moodle Code Checker
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci codechecker --max-warnings 0 $GITHUB_WORKSPACE/plugin

      - name: Moodle PHPDoc Checker
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci phpdoc $GITHUB_WORKSPACE/plugin

      - name: Validating
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci validate $GITHUB_WORKSPACE/plugin

      - name: Check upgrade savepoints
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci savepoints $GITHUB_WORKSPACE/plugin

      - name: Mustache Lint
        continue-on-error: true
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci mustache $GITHUB_WORKSPACE/plugin

      - name: Grunt
        continue-on-error: true
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci grunt --max-lint-warnings 0 $GITHUB_WORKSPACE/plugin

      - name: PHPUnit tests (mod_videolesson)
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci phpunit --fail-on-warning $GITHUB_WORKSPACE/plugin

      - name: Behat features (mod_videolesson)
        continue-on-error: true
        if: ${{ !cancelled() }}
        run: moodle-plugin-ci behat --profile chrome $GITHUB_WORKSPACE/plugin
